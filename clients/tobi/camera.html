<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cuadro Mágico — Tobi</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
      
      #splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, #1e1e2f 0%, #0a0a0c 100%);
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        z-index: 10000; color: white; text-align: center; transition: opacity 0.5s ease-out;
      }
      .splash-content {
        padding: 30px; border-radius: 20px; background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
      h1 { margin-bottom: 10px; font-size: 24px; color: #fff; }
      p { margin-bottom: 30px; color: #ccc; font-size: 16px; }
      .btn-start {
        padding: 16px 40px; font-size: 18px; font-weight: bold;
        background: linear-gradient(135deg, #6e8efb, #a777e3); color: white;
        border: none; border-radius: 50px; cursor: pointer; transition: 0.2s;
      }

      #fallback-ui {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0,0,0,0.98); z-index: 9999;
        display: none; flex-direction: column; justify-content: center; align-items: center;
      }
      #fallback-ui .video-wrapper {
        position: relative; width: 100%; height: 100%;
        display: flex; justify-content: center; align-items: center;
      }
      #fallback-ui video {
        width: 100%; height: 100%; object-fit: contain; pointer-events: auto;
      }
      
      .fallback-controls {
        position: absolute; bottom: 30px; right: 30px;
        display: flex; gap: 15px; opacity: 0.8; z-index: 10001; 
      }
      
      .btn-icon {
        background: rgba(0,0,0,0.8); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%;
        width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; cursor: pointer;
      }
      .btn-icon img { width: 30px; height: 30px; pointer-events: none; }
      
      #btn-close-fb {
        position: absolute; top: 30px; left: 20px; z-index: 10001;
        background: rgba(200,50,50,0.8); color: white; font-weight: bold; border: 2px solid rgba(255,255,255,0.5); padding: 12px 25px; border-radius: 30px; cursor: pointer;
      }

      #ar-ui-overlay {
        position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000; display: none;
      }
      .btn-sound {
        padding: 12px 25px; background: rgba(0, 0, 0, 0.7); color: white; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 30px; font-weight: bold; cursor: pointer;
      }
      
      #btn-exit-camera {
        position: fixed; top: 20px; right: 20px; z-index: 1000;
        background: rgba(0,0,0,0.6); color: white; border: 1px solid rgba(255,255,255,0.4);
        padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer;
        backdrop-filter: blur(5px);
      }
    </style>

    <script>
      /* Componente para actualizar textura de video cada frame */
      AFRAME.registerComponent('video-texture-update', {
        init: function () { this.textureReady = false; },
        tick: function () {
          if (!this.textureReady) {
            const mesh = this.el.getObject3D('mesh');
            if (mesh && mesh.material && mesh.material.map) this.textureReady = true;
            return;
          }
          const mesh = this.el.getObject3D('mesh');
          if (mesh && mesh.material && mesh.material.map) mesh.material.map.needsUpdate = true;
        }
      });

      /* Componente de tracking AR sin ningún cursor/raycaster de A-Frame */
      AFRAME.registerComponent('video-handler', {
        init: function () {
          const video = document.querySelector("#clientVideo");
          const ui = document.querySelector("#ar-ui-overlay");
          
          this.el.addEventListener('targetFound', () => {
            console.log("Cuadro detectado");
            ui.style.display = "block";
            window.isTargetVisible = true;
            
            const fallback = document.getElementById('fallback-ui');
            if (fallback.style.display !== "none" && !window.isFullscreenApiActive) {
               exitFallbackMode(); 
            }
            if(video) video.play().catch(e => console.error(e));
          });

          this.el.addEventListener('targetLost', () => {
             console.log("Cuadro perdido");
             ui.style.display = "none";
             window.isTargetVisible = false;
             if(video && !video.paused) {
                 enterFallbackMode();
             }
          });
        }
      });

      window.isTargetVisible = false;
      window.isFullscreenApiActive = false;

      function enterFallbackMode() {
        const fallback = document.getElementById('fallback-ui');
        const arVideo = document.getElementById('clientVideo');
        const fbVideo = document.getElementById('fbVideo');
        
        fallback.style.display = "flex";
        document.getElementById('ar-ui-overlay').style.display = "none";
        
        if(arVideo && fbVideo) {
           // Sincronizar timestamp y arrancar fbVideo ANTES de pausar arVideo para transición sin corte
           fbVideo.currentTime = arVideo.currentTime;
           fbVideo.muted = arVideo.muted;
           fbVideo.play().then(() => {
              // Recién cuando fbVideo está reproduciéndose, silenciamos el AR
              arVideo.pause();
           }).catch(() => {
              arVideo.pause();
           });
        }
      }

      function exitFallbackMode() {
        const fallback = document.getElementById('fallback-ui');
        const arVideo = document.getElementById('clientVideo');
        const fbVideo = document.getElementById('fbVideo');
        
        fallback.style.display = "none";
        if(window.isTargetVisible) { document.getElementById('ar-ui-overlay').style.display = "block"; }
        
        if(arVideo && fbVideo) {
           arVideo.currentTime = fbVideo.currentTime;
           fbVideo.pause();
           if(window.isTargetVisible) { arVideo.play(); }
        }
      }

      function toggleRealFullscreen() {
         const fbVideo = document.getElementById('fbVideo');
         if (document.fullscreenElement || document.webkitFullscreenElement) {
             if(document.exitFullscreen) document.exitFullscreen();
             else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
             window.isFullscreenApiActive = false;
         } else {
             window.isFullscreenApiActive = true;
             if (fbVideo.requestFullscreen) fbVideo.requestFullscreen();
             else if (fbVideo.webkitEnterFullscreen) fbVideo.webkitEnterFullscreen();
         }
      }

      function startAR() {
        const splash = document.getElementById('splash-screen');
        const arVid = document.getElementById('clientVideo');
        const fbVid = document.getElementById('fbVideo');
        
        if (arVid) arVid.play().then(() => { arVid.pause(); arVid.currentTime = 0; }).catch(()=>{});
        if (fbVid) fbVid.play().then(() => { fbVid.pause(); fbVid.currentTime = 0; }).catch(()=>{});
        
        splash.style.opacity = '0';
        setTimeout(() => { 
            splash.style.display = 'none'; 
            document.getElementById('btn-exit-camera').style.display = 'block';
        }, 500);
      }
      
      /* ============================================================
         RAYCASTER MANUAL CON THREE.JS
         MindAR captura todos los eventos touch del canvas para su
         tracking de imagenes, bloqueando el cursor de A-Frame.
         La solucion es escuchar directamente en el canvas y
         hacer raycasting manual con Three.js.
         ============================================================ */
      document.addEventListener("DOMContentLoaded", () => {
         // Fallback video play/pause
         const fbVideo = document.getElementById('fbVideo');
         fbVideo.addEventListener('click', () => {
            if(fbVideo.paused) fbVideo.play(); else fbVideo.pause();
         });
         fbVideo.addEventListener('webkitendfullscreen', () => { window.isFullscreenApiActive = false; });

         // Refresh pull-to-refresh manual
         let touchStartY = 0;
         document.addEventListener('touchstart', e => {
            touchStartY = e.touches[0].clientY;
         }, {passive: true});
         
         document.addEventListener('touchend', e => {
            const touchEndY = e.changedTouches[0].clientY;
            if (touchEndY - touchStartY > 150) {
               // Evita recargar si está en la pantalla de inicio o en pantalla completa
               if(document.getElementById('splash-screen').style.display === 'none' && document.getElementById('fallback-ui').style.display !== 'flex') {
                  window.location.reload();
               }
            }
         }, {passive: true});

         // Esperar a que A-Frame y MindAR inicialicen la escena
         const sceneEl = document.querySelector('a-scene');
         sceneEl.addEventListener('loaded', () => {
            const canvas = sceneEl.canvas;
            const threeCamera = sceneEl.camera;
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            // Referencia directa a los meshes 3D de nuestros elementos clickeables
            const videoPlane = document.querySelector('#videoPlane');
            const fsButton = document.querySelector('#fsButton');
            
            canvas.addEventListener('touchend', (evt) => {
               // Ignorar si hay un overlay de Fallback activo por encima
               if(document.getElementById('fallback-ui').style.display === 'flex') return;
               
               const touch = evt.changedTouches[0];
               const rect = canvas.getBoundingClientRect();
               
               // Normalizar coordenadas de toque a rango [-1, 1] para Three.js
               mouse.x = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
               mouse.y = -((touch.clientY - rect.top) / rect.height) * 2 + 1;
               
               raycaster.setFromCamera(mouse, threeCamera);
               
               // Recoger todos los meshes clickeables
               const clickables = [];
               if(fsButton) {
                  const fsMesh = fsButton.getObject3D('mesh');
                  if(fsMesh) clickables.push({ mesh: fsMesh, action: 'fullscreen' });
               }
               if(videoPlane) {
                  const vpMesh = videoPlane.getObject3D('mesh');
                  if(vpMesh) clickables.push({ mesh: vpMesh, action: 'playpause' });
               }
               
               // Priorizar el botón fullscreen (está al frente en Z)
               const allMeshes = clickables.map(c => c.mesh);
               const intersects = raycaster.intersectObjects(allMeshes, true);
               
               if(intersects.length > 0) {
                  const hitMesh = intersects[0].object;
                  // Buscar a cuál de nuestros clickables pertenece
                  const matched = clickables.find(c => c.mesh === hitMesh || hitMesh.parent === c.mesh || c.mesh.parent === hitMesh);
                  
                  if(matched) {
                     if(matched.action === 'fullscreen') {
                        enterFallbackMode();
                     } else if(matched.action === 'playpause') {
                        const video = document.getElementById('clientVideo');
                        if(video) {
                           if(video.paused) video.play(); else video.pause();
                        }
                     }
                  }
               }
            });
         });
      });
    </script>
  </head>

  <body>
    <div id="splash-screen">
      <div class="splash-content">
        <h1>Cuadro Mágico AR</h1>
        <p>Experiencia de <strong>Tobi</strong></p>
        <button class="btn-start" onclick="startAR()">¡COMENZAR!</button>
      </div>
    </div>

    <div id="ar-ui-overlay">
      <button class="btn-sound" onclick="document.querySelector('#clientVideo').muted = false; document.querySelector('#fbVideo').muted = false; this.style.display='none';">
        🔊 ACTIVAR SONIDO
      </button>
    </div>
    
    <button id="btn-exit-camera" onclick="window.location.href='../../index.html'" style="display:none;">✕ Salir</button>

    <div id="fallback-ui">
      <button id="btn-close-fb" onclick="exitFallbackMode()">✕ Volver al Cuadro</button>
      <div class="video-wrapper">
         <video id="fbVideo" src="./tobi.mp4" playsinline webkit-playsinline loop></video>
         <div class="fallback-controls">
           <button class="btn-icon" onclick="toggleRealFullscreen()"><img src="../../img/fullscreen.svg" alt="Ampliar"></button>
         </div>
      </div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./tobi.mind; autoStart: true; uiLoading: yes; uiScanning: yes; filterMinCF: 0.00001; filterBeta: 0.0001; warmupTolerance: 10; missTolerance: 60;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="clientVideo" src="./tobi.mp4" preload="metadata" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
        <img id="icon-fs" src="../../img/fullscreen.svg">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" video-handler>
        <a-plane id="videoPlane" material="shader: flat; src: #clientVideo; transparent: false;" width="1" height="1.33" position="0 0 0" rotation="0 0 0" video-texture-update></a-plane>
        <a-image id="fsButton" src="#icon-fs" width="0.15" height="0.15" position="0.4 -0.55 0.02" transparent="true"></a-image>
      </a-entity>
      
    </a-scene>
  </body>
</html>
