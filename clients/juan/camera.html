<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <!-- El status-bar-style en black-translucent ayuda a inmersión en PWA -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Cuadro Mágico — Juan</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
      
      #splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, #1e1e2f 0%, #0a0a0c 100%);
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        z-index: 10000; color: white; text-align: center; transition: opacity 0.5s ease-out;
      }
      .splash-content {
        padding: 30px; border-radius: 20px; background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
      h1 { margin-bottom: 10px; font-size: 24px; color: #fff; }
      p { margin-bottom: 30px; color: #ccc; font-size: 16px; }
      .btn-start {
        padding: 16px 40px; font-size: 18px; font-weight: bold;
        background: linear-gradient(135deg, #6e8efb, #a777e3); color: white;
        border: none; border-radius: 50px; cursor: pointer; transition: 0.2s;
      }

      /* 2D Fallback / Pantalla Completa Adaptativa */
      #fallback-ui {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0,0,0,0.98); z-index: 9999;
        display: none; flex-direction: column; justify-content: center; align-items: center;
      }
      #fallback-ui .video-wrapper {
        position: relative; width: 100%; height: 100%;
        display: flex; justify-content: center; align-items: center;
      }
      #fallback-ui video {
        width: 100%; height: 100%; object-fit: contain; pointer-events: auto;
      }
      
      .fallback-controls {
        position: absolute; bottom: 30px; right: 30px;
        display: flex; gap: 15px; opacity: 0.8; z-index: 10001; 
      }
      .fallback-controls:active { opacity: 1; }
      
      .btn-icon {
        background: rgba(0,0,0,0.8); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%;
        width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; cursor: pointer;
      }
      .btn-icon img { width: 30px; height: 30px; pointer-events: none; }
      
      #btn-close-fb {
        position: absolute; top: 30px; left: 20px; z-index: 10001;
        background: rgba(200,50,50,0.8); color: white; font-weight: bold; border: 2px solid rgba(255,255,255,0.5); padding: 12px 25px; border-radius: 30px; cursor: pointer;
      }

      #ar-ui-overlay {
        position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000; display: none;
      }
      .btn-sound {
        padding: 12px 25px; background: rgba(0, 0, 0, 0.7); color: white; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 30px; font-weight: bold; cursor: pointer;
      }
    </style>

    <script>
      AFRAME.registerComponent('video-texture-update', {
        init: function () { this.textureReady = false; },
        tick: function () {
          if (!this.textureReady) {
            const mesh = this.el.getObject3D('mesh');
            if (mesh && mesh.material && mesh.material.map) this.textureReady = true;
            return;
          }
          const mesh = this.el.getObject3D('mesh');
          if (mesh && mesh.material && mesh.material.map) mesh.material.map.needsUpdate = true;
        }
      });

      /* COMPONENTE INTERACTIVO 3D: Detectar toques al video nativo crudo para celulares (mousedown y touchstart envés de click sintético que se tranca) */
      AFRAME.registerComponent('ar-video-controls', {
        init: function () {
          const video = document.querySelector("#clientVideo");
          
          this.el.addEventListener('mousedown', (evt) => {
            evt.stopPropagation();
            if (!video) return;
            if (video.paused) { video.play(); } else { video.pause(); }
          });
          
          this.el.addEventListener('touchstart', (evt) => {
            evt.stopPropagation();
            if (!video) return;
            if (video.paused) { video.play(); } else { video.pause(); }
          });
        }
      });

       /* COMPONENTE INTERACTIVO 3D: Botón Fullscreen */
       AFRAME.registerComponent('ar-fullscreen-btn', {
        init: function () {
          this.el.addEventListener('mousedown', (evt) => {
            evt.stopPropagation(); 
            enterFallbackMode();
          });
          this.el.addEventListener('touchstart', (evt) => {
            evt.stopPropagation(); 
            enterFallbackMode();
          });
        }
      });

      AFRAME.registerComponent('video-handler', {
        init: function () {
          const video = document.querySelector("#clientVideo");
          const ui = document.querySelector("#ar-ui-overlay");
          
          this.el.addEventListener('targetFound', () => {
            console.log("Cuadro detectado");
            ui.style.display = "block";
            window.isTargetVisible = true;
            
            const fallback = document.getElementById('fallback-ui');
            if (fallback.style.display !== "none" && !window.isFullscreenApiActive) {
               // Retornamos automáticamente al mundo Real 3D si reenfocó y NO está atrincherado en el modo FullScreen Nativo
               exitFallbackMode(); 
            }
            if(video) video.play().catch(e => console.error(e));
          });

          this.el.addEventListener('targetLost', () => {
             console.log("Cuadro perdido");
             ui.style.display = "none";
             window.isTargetVisible = false;
             
             // Si estabamos viéndolo, lo mandamos a fallback 2D para que no se apague al mover cabezas rápido.
             if(video && !video.paused) {
                 enterFallbackMode();
             }
          });
        }
      });

      window.isTargetVisible = false;
      window.isFullscreenApiActive = false;

      function enterFallbackMode() {
        const fallback = document.getElementById('fallback-ui');
        const arVideo = document.getElementById('clientVideo');
        const fbVideo = document.getElementById('fbVideo');
        
        fallback.style.display = "flex";
        document.getElementById('ar-ui-overlay').style.display = "none";
        
        if(arVideo && fbVideo) {
           fbVideo.currentTime = arVideo.currentTime;
           arVideo.pause(); 
           fbVideo.play();
           fbVideo.muted = arVideo.muted;
        }
      }

      function exitFallbackMode() {
        // Normalizar UI devuelta al 3D
        const fallback = document.getElementById('fallback-ui');
        const arVideo = document.getElementById('clientVideo');
        const fbVideo = document.getElementById('fbVideo');
        
        fallback.style.display = "none";
        if(window.isTargetVisible) { document.getElementById('ar-ui-overlay').style.display = "block"; }
        
        if(arVideo && fbVideo) {
           arVideo.currentTime = fbVideo.currentTime;
           fbVideo.pause();
           if(window.isTargetVisible) { arVideo.play(); }
        }
      }

      function toggleRealFullscreen() {
         /* MAGIA PARA EL CELULAR: API Nativa al elemento Video. */
         /* Si llamas FS a un DIV, iOS no esconde la barra. Si lo haces a un <video>, el reproductor absorbe la pantalla perfectamente! */
         const fbVideo = document.getElementById('fbVideo');
         
         if (document.fullscreenElement || document.webkitFullscreenElement) {
             // Si ya estaba en Fullscreen nativo, sale.
             if(document.exitFullscreen) document.exitFullscreen();
             else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
             window.isFullscreenApiActive = false;
         } else {
             window.isFullscreenApiActive = true;
             // Si está en fallback de browser y quiere verdaderamente ocultar las barras:
             if (fbVideo.requestFullscreen) fbVideo.requestFullscreen();
             else if (fbVideo.webkitEnterFullscreen) fbVideo.webkitEnterFullscreen(); // Este es Crítico para iPhones
         }
      }

      function startAR() {
        const splash = document.getElementById('splash-screen');
        const arVid = document.getElementById('clientVideo');
        const fbVid = document.getElementById('fbVideo');
        
        if (arVid) arVid.play().then(() => { arVid.pause(); arVid.currentTime = 0; }).catch(()=>{});
        if (fbVid) fbVid.play().then(() => { fbVid.pause(); fbVid.currentTime = 0; }).catch(()=>{});
        
        splash.style.opacity = '0';
        setTimeout(() => { splash.style.display = 'none'; }, 500);
      }
      
      // Controlar para destrabar el video si el usuario interactua globalmente con FallBack Video Play/Pause (que puede desactivarlo el fallback auto)
      document.addEventListener("DOMContentLoaded", () => {
         const fbVideo = document.getElementById('fbVideo');
         fbVideo.addEventListener('click', () => {
            if(fbVideo.paused) fbVideo.play(); else fbVideo.pause();
         });
         
         // Escuchar salidas de FS nativo (Botón Done nativo de iOs o swipe down)
         fbVideo.addEventListener('webkitendfullscreen', () => { window.isFullscreenApiActive = false; });
      });
    </script>
  </head>

  <body>
    <!-- INTERFAZ SPLASH -->
    <div id="splash-screen">
      <div class="splash-content">
        <h1>Cuadro Mágico AR</h1>
        <p>Experiencia de <strong>Juan</strong></p>
        <button class="btn-start" onclick="startAR()">¡COMENZAR!</button>
      </div>
    </div>

    <div id="ar-ui-overlay">
      <button class="btn-sound" onclick="document.querySelector('#clientVideo').muted = false; document.querySelector('#fbVideo').muted = false; this.style.display='none';">
        🔊 ACTIVAR SONIDO
      </button>
    </div>

    <!-- UI DEL MODO ADAPTATIVO: Abarca desde salir del Cuadro 3D de repente hasta oprimir expandir -->
    <div id="fallback-ui">
      <button id="btn-close-fb" onclick="exitFallbackMode()">✕ Volver al Cuadro</button>
      <div class="video-wrapper">
         <!-- Quitamos controls predefinido para usar nuestro boton limpio, y para que en click pause() sin estorbos, salvo nativo iOs en fs -->
         <video id="fbVideo" src="./juan.mp4" playsinline webkit-playsinline loop></video>
         <div class="fallback-controls">
           <!-- YouTube-like nativo request FS -->
           <button class="btn-icon" onclick="toggleRealFullscreen()"><img src="../../img/fullscreen.svg" alt="Ampliar"></button>
         </div>
      </div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./juan.mind; autoStart: true; uiLoading: yes; uiScanning: yes; filterMinCF: 0.00001; filterBeta: 0.0001; warmupTolerance: 10; missTolerance: 60;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="clientVideo" src="./juan.mp4" preload="metadata" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
        <img id="icon-fs" src="../../img/fullscreen.svg">
      </a-assets>

      <!-- Raycaster 3D con Clicks sincrónicos habilitados -->
      <a-camera position="0 0 0" look-controls="enabled: false">
         <a-entity cursor="rayOrigin: mouse; fuse: false" raycaster="objects: .clickable"></a-entity>
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0" video-handler>
        <a-plane class="clickable" ar-video-controls material="shader: flat; src: #clientVideo; transparent: false;" width="1" height="0.75" position="0 0 0" rotation="0 0 0" video-texture-update></a-plane>
        <a-image class="clickable" ar-fullscreen-btn src="#icon-fs" width="0.15" height="0.15" position="0.4 -0.3 0.02" transparent="true"></a-image>
      </a-entity>
      
    </a-scene>
  </body>
</html>
