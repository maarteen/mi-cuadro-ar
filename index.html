<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>
      // Detectar si hay errores cargando el archivo .mind
      window.addEventListener("load", () => {
        const sceneEl = document.querySelector('a-scene');
        sceneEl.addEventListener("arError", (event) => {
          alert("Error de AR: " + event.detail.error);
        });
      });
    </script>
  </head>

  <body>
    <!-- Usamos ./ para asegurar que busque en la misma carpeta -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video 
          id="videoPareja" 
          src="https://www.w3schools.com/html/mov_bbb.mp4" 
          preload="auto" 
          loop="true" 
          crossorigin="anonymous" 
          webkit-playsinline 
          playsinline 
          muted>
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video 
          src="#videoPareja" 
          width="1" 
          height="0.6" 
          position="0 0 0">
        </a-video>
      </a-entity>
      
    </a-scene>
  </body>
</html>
